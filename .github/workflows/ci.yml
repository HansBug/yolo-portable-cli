name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-verify:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux glibc (dynamic, Ubuntu/Debian/Fedora-style)
          - platform: linux-x86_64-gnu
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bin: yolo-cli
          - platform: linux-aarch64-gnu
            os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            bin: yolo-cli
          # Linux musl (fully static, Alpine-compatible, runs on any distro)
          - platform: linux-x86_64-musl
            os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            bin: yolo-cli
          - platform: linux-aarch64-musl
            os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-musl
            bin: yolo-cli
          # macOS — oldest free runner per arch for max backward compat
          - platform: macos-x86_64
            os: macos-13
            target: x86_64-apple-darwin
            bin: yolo-cli
          - platform: macos-aarch64
            os: macos-14
            target: aarch64-apple-darwin
            bin: yolo-cli
          # Windows — +crt-static gives a standalone .exe with no VC redistributable
          - platform: windows-x86_64
            os: windows-2022
            target: x86_64-pc-windows-msvc
            bin: yolo-cli.exe
          - platform: windows-aarch64
            os: windows-11-arm
            target: aarch64-pc-windows-msvc
            bin: yolo-cli.exe

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Install musl tools
        if: endsWith(matrix.target, '-musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install Rust stable + target
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}
          rustup default stable

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            rust/target
          key: cargo-${{ matrix.platform }}-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.platform }}-

      - name: Build release binary
        working-directory: rust
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Binary info
        working-directory: rust
        run: |
          BIN=target/${{ matrix.target }}/release/${{ matrix.bin }}
          ls -la "$BIN"
          if command -v stat >/dev/null 2>&1; then
            stat -c "%s bytes" "$BIN" 2>/dev/null || stat -f "%z bytes" "$BIN" 2>/dev/null || true
          fi
          command -v file >/dev/null 2>&1 && file "$BIN" || true
          command -v ldd >/dev/null 2>&1 && ldd "$BIN" 2>&1 || true
          command -v otool >/dev/null 2>&1 && otool -L "$BIN" || true
          command -v dumpbin >/dev/null 2>&1 && dumpbin //DEPENDENTS "$BIN" || true

      - name: Run on fixtures
        working-directory: rust
        run: |
          BIN=target/${{ matrix.target }}/release/${{ matrix.bin }}
          "$BIN" ../models/yolov8n.onnx ../assets/bus.jpg
          "$BIN" ../models/yolov8n.onnx ../assets/zidane.jpg
          "$BIN" ../models/yolov8n.onnx ../assets/dog.jpg

      - name: Verify against reference detections
        run: |
          python3 scripts/verify.py \
            rust/target/${{ matrix.target }}/release/${{ matrix.bin }} \
            models/yolov8n.onnx \
            assets/bus.jpg assets/zidane.jpg assets/dog.jpg

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: yolo-cli-${{ matrix.platform }}
          path: rust/target/${{ matrix.target }}/release/${{ matrix.bin }}
          retention-days: 14
          if-no-files-found: error
