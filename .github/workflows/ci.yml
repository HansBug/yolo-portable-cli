name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-verify:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: musl static (zero glibc/ld-linux dep, works on any Linux distro)
          - platform: linux-x86_64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            bin: yolo-cli
            shell: bash
          - platform: linux-aarch64
            os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-musl
            bin: yolo-cli
            shell: bash
          # macOS: oldest free runners for max backwards compat
          - platform: macos-x86_64
            os: macos-13
            target: x86_64-apple-darwin
            bin: yolo-cli
            shell: bash
          - platform: macos-aarch64
            os: macos-14
            target: aarch64-apple-darwin
            bin: yolo-cli
            shell: bash
          # Windows: +crt-static so no VC++ redistributable needed on target machine
          - platform: windows-x86_64
            os: windows-2022
            target: x86_64-pc-windows-msvc
            bin: yolo-cli.exe
            shell: bash
          - platform: windows-aarch64
            os: windows-11-arm
            target: aarch64-pc-windows-msvc
            bin: yolo-cli.exe
            shell: bash

    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - uses: actions/checkout@v4

      - name: Install musl tools (Linux only)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install Rust stable + target
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}
          rustup default stable

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            rust/target
          key: cargo-${{ matrix.platform }}-${{ hashFiles('rust/Cargo.toml') }}
          restore-keys: |
            cargo-${{ matrix.platform }}-

      - name: Build release binary
        working-directory: rust
        run: cargo build --release --target ${{ matrix.target }} --locked=false

      - name: Binary info
        working-directory: rust
        run: |
          BIN=target/${{ matrix.target }}/release/${{ matrix.bin }}
          ls -la "$BIN"
          # size/dep diagnostics — platform-specific tool availability means we best-effort
          if command -v file >/dev/null; then file "$BIN" || true; fi
          if command -v ldd >/dev/null; then ldd "$BIN" 2>&1 || true; fi
          if command -v otool >/dev/null; then otool -L "$BIN" || true; fi
          if command -v dumpbin >/dev/null; then dumpbin //DEPENDENTS "$BIN" || true; fi

      - name: Run on fixtures
        working-directory: rust
        run: |
          BIN=target/${{ matrix.target }}/release/${{ matrix.bin }}
          "$BIN" ../models/yolov8n.onnx ../assets/bus.jpg    | tee ../bus.out
          "$BIN" ../models/yolov8n.onnx ../assets/zidane.jpg | tee ../zidane.out
          "$BIN" ../models/yolov8n.onnx ../assets/dog.jpg    | tee ../dog.out

      - name: Verify against reference detections
        run: |
          python3 scripts/verify.py \
            rust/target/${{ matrix.target }}/release/${{ matrix.bin }} \
            models/yolov8n.onnx \
            assets/bus.jpg assets/zidane.jpg assets/dog.jpg

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: yolo-cli-${{ matrix.platform }}
          path: rust/target/${{ matrix.target }}/release/${{ matrix.bin }}
          retention-days: 14
          if-no-files-found: error
