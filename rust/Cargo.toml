[package]
name = "yolo-tract"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "yolo-tract"
path = "src/main.rs"

[dependencies]
tract-onnx = { version = "0.21", default-features = false }
image = { version = "0.25", default-features = false, features = ["jpeg", "png"] }

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true
debug = false
incremental = false
